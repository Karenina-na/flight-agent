llm:
  provider: openai_compatible
  base_url: "http://127.0.0.1:1234/v1"
  api_key: "not-needed"
  model: "google/gemma-4-e2b"
  temperature: 0.3
  context_window_tokens: 8192

agent:
  default_thread_id: "1"

memory:
  checkpointer:
    type: "in_memory"
  store:
    enabled: true
    type: "in_memory"

observability:
  logging:
    enabled: true
    level: "INFO"
    format: "text"
    redact: true
    output_path: "logs/skypilot.log"

summarization:
  enabled: true
  model: "main"
  trigger:
    type: "fraction"
    value: 0.8
  keep:
    type: "messages"
    value: 20
  trim_tokens_to_summarize: 4000

air_ticket:
  provider: "mock"
  flyclaw:
    timeout_seconds: 20
    proxy_url: ""
    route_relay: true
