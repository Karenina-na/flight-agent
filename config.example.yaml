llm:
  provider: openai_compatible
  base_url: "http://127.0.0.1:1234/v1"
  api_key: "not-needed"
  model: "qwen3.5-4b-mlx"
  temperature: 0.3
  context_window_tokens: 8192
  timeout_seconds: 120
  max_retries: 1

agent:
  default_thread_id: "1"

memory:
  checkpointer:
    type: "in_memory"
  store:
    enabled: true
    type: "in_memory"

observability:
  logging:
    enabled: true
    level: "INFO"
    format: "text"
    redact: true
    output_path: "logs/skypilot.log"
    console: false

summarization:
  enabled: true
  model: "main"
  timeout_seconds: 45
  max_output_tokens: 768
  max_retries: 0
  reasoning_enabled: false
  trigger:
    type: "fraction"
    value: 0.55
  keep:
    type: "fraction"
    value: 0.35
  trim_tokens_to_summarize: 3000

air_ticket:
  provider: "mock"
  flyclaw:
    external_path: "external/FlyClaw"
    timeout_seconds: 20
    proxy_url: ""
    route_relay: true
